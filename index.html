<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GC — Curved Wheel Gallery</title>
    <link rel="preload" as="image" href="/ux_blanc.svg" fetchpriority="high" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0b;
      }
      #root {
        min-height: 100%;
        width: 100%;
      }
      /* Shell statique — sync avec GALLERY_ITEMS[0] (Jahia) dans images.ts */
      .app-shell {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 130% 110% at 8% -5%, color-mix(in srgb, #011932 82%, transparent) 0%, transparent 52%),
          radial-gradient(ellipse 95% 85% at 92% 105%, color-mix(in srgb, #057cc3 72%, transparent) 0%, transparent 48%),
          radial-gradient(circle at 55% 45%, color-mix(in srgb, #011932 28%, transparent) 0%, transparent 62%),
          linear-gradient(155deg, #f9fbff 0%, #f9fbff 100%);
      }
      .app-shell__brand {
        position: absolute;
        top: 1.75rem;
        left: 1.75rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .app-shell__logo {
        width: 2rem;
        height: 2rem;
        object-fit: contain;
        opacity: 0.9;
      }
      .app-shell__sep {
        width: 1px;
        height: 1.35rem;
        background: rgba(255, 255, 255, 0.22);
        flex-shrink: 0;
      }
      .app-shell__name {
        margin: 0;
        font-size: 0.82rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
        font-weight: 400;
        line-height: 1;
      }
      .app-shell__name strong {
        font-weight: 700;
        color: #fff;
      }
      .app-shell__loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .app-shell__loader-logo {
        width: 2.5rem;
        height: 2.5rem;
        object-fit: contain;
        opacity: 0.5;
        animation: shell-loader-pulse 1.6s ease-in-out infinite;
      }
      @keyframes shell-loader-pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.94); }
        50% { opacity: 0.95; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-shell" aria-hidden="true">
        <div class="app-shell__brand">
          <img
            class="app-shell__logo"
            src="/ux_blanc.svg"
            alt=""
            width="32"
            height="32"
            fetchpriority="high"
            decoding="async"
          />
          <span class="app-shell__sep" aria-hidden="true"></span>
          <p class="app-shell__name"><strong>Gabin</strong> CHAMEROY : TEST 1</p>
        </div>
        <div class="app-shell__loader" aria-hidden="true">
          <img
            class="app-shell__loader-logo"
            src="/ux_blanc.svg"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
